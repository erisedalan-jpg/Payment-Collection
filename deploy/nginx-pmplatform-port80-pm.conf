# nginx 接入片段 —— 项目管理平台（端口 80 + 路径前缀 /pm，与同机其它系统共存）
# 首页对外: http://<服务器IP>/pm
#
# 因服务器是共享的(根路径 / 与 /api、/data 可能被别的系统占用),本系统只接管 /pm/ 这一段路径:
# 前端已用 base=/pm/ 构建,且所有接口/数据请求都带 /pm 前缀(/pm/api、/pm/data),故不碰任何根路径。
#
# ============================================================================
# 用法 A(推荐,共享服务器): 把下面这个 location 块整段粘进现有监听 80 端口的 server { } 里
# (即别的系统已有的那个 server 块),然后 sudo nginx -t && sudo systemctl reload nginx。
# ============================================================================

    # —— 项目管理平台: 只接管 /pm/ —— (粘进现有 :80 的 server 块)
    location = /pm { return 301 /pm/; }
    location /pm/ {
        proxy_pass http://127.0.0.1:8080/;     # 末尾 / 关键: 把 /pm/xxx 重写成 /xxx 再发给 app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;             # 允许上传 PMIS/CSV 大文件
        gzip on;                               # 主数据 ~12MB,gzip 后 ~0.85MB
        gzip_types application/json application/javascript text/css text/plain;
        gzip_min_length 1024;
        proxy_buffering off;                   # SSE 进度流实时;对静态/数据无害
        proxy_read_timeout 3600s;              # 长耗时数据处理
    }

# ============================================================================
# 用法 B(本系统独占某域名/IP 时): 用下面这个独立 server 块(已含上面的 location)。
# 注意 server_name 要填本系统专用的域名或 IP,不要用 _ catch-all,以免抢占别的系统。
# ============================================================================
#
# server {
#     listen 80;
#     server_name pm.intranet.example;          # 改成本系统专用域名/IP
#     client_max_body_size 100M;
#     gzip on; gzip_types application/json application/javascript text/css text/plain; gzip_min_length 1024;
#     location = /pm { return 301 /pm/; }
#     location /pm/ {
#         proxy_pass http://127.0.0.1:8080/;
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_buffering off;
#         proxy_read_timeout 3600s;
#     }
# }
#
# 前端必须用 base=/pm/ 构建:  cd frontend && npm run build -- --base=/pm/
# 端口 80 = 明文 HTTP,会话/数据不加密。仅可信内网用;不可信网络改 443 + TLS(/pm 结构不变)。

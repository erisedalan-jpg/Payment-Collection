# nginx 反向代理 —— 项目管理平台（端口 80 + 路径前缀 /pm）
# 首页对外: http://<服务器IP>/pm
# 架构: nginx(80) → 反代 → app(127.0.0.1:8080, systemd 托管)
#
# 安装:
#   sudo cp deploy/nginx-pmplatform-port80-pm.conf /etc/nginx/sites-available/pmplatform
#   sudo ln -s /etc/nginx/sites-available/pmplatform /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default        # 去掉默认站点,避免占用 80
#   sudo nginx -t && sudo systemctl reload nginx
#
# 前端必须用 base=/pm/ 构建(否则 /pm 下资源 404):
#   cd frontend && npm run build -- --base=/pm/
#
# 端口 80 = 明文 HTTP,会话 cookie 与数据在网络上不加密。仅在可信内网使用;
# 不可信网络强烈建议改 443 + TLS(见 deploy/nginx-pmplatform.conf 的 ssl 段,/pm 结构不变)。

server {
    listen 80;
    server_name _;                       # 匹配任意主机名/IP

    client_max_body_size 100M;           # 允许上传 PMIS/CSV 大文件(/api/*upload)

    # gzip: 主数据 analysis_data.json 实测 ~12MB,gzip 后 ~0.85MB(14x),首屏关键
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1024;
    gzip_proxied any;

    # 根路径与 /pm(无尾斜杠) 都跳到 /pm/
    location = /  { return 301 /pm/; }
    location = /pm { return 301 /pm/; }

    # 前端 SPA 挂在 /pm/ 下: proxy_pass 带尾斜杠会去掉 /pm 前缀,
    # app 内部仍以根提供 SPA(/pm/payment 转 app /payment, /pm/assets/x.js 转 app /assets/x.js)
    location /pm/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 进度流(数据更新/重算): 必须关缓冲,否则进度条不实时。前端以根路径 /api 请求,
    # 故此处匹配根 /api,不带 /pm。正则 location 优先于前缀 location。
    location ~ ^/api/(reprocess|sync|import|pmis) {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;        # 长耗时数据处理
    }

    # 数据与接口在根路径(前端 fetch 用绝对路径 /data 与 /api),直接转发给 app(不去前缀)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /data/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

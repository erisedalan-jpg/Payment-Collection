# nginx 反向代理 —— 项目管理平台
# 安装:sudo cp deploy/nginx-pmplatform.conf /etc/nginx/sites-available/pmplatform
#       sudo ln -s /etc/nginx/sites-available/pmplatform /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# 作用:对内网终止 TLS(HTTPS) + gzip 压缩(12MB 主数据 → ~0.85MB) + SSE 进度透传,
#       后端应用始终绑 127.0.0.1:8080(不对外暴露)。

server {
    listen 443 ssl;
    server_name pm.intranet.example;          # 改成你的内网域名或服务器 IP

    ssl_certificate     /etc/ssl/pmplatform/server.crt;   # 自签或内网 CA 签发
    ssl_certificate_key /etc/ssl/pmplatform/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100M;                # 允许上传 PMIS/CSV 大文件(/api/*upload)

    # gzip:主数据 analysis_data.json 实测 ~12MB → gzip 后 ~0.85MB(14x),首屏体验关键
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1024;
    gzip_proxied any;

    # 普通请求
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 进度流端点:必须关缓冲,否则"数据更新/同步/导入"进度条不实时
    location ~ ^/api/(sync|reprocess|import|pmis) {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;             # 长耗时数据处理
    }
}

# 可选:80 → 443 跳转
server {
    listen 80;
    server_name pm.intranet.example;
    return 301 https://$host$request_uri;
}

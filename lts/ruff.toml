# Ruff 配置 —— 渐进式采用策略
#
# 当前阶段：只拦"真正的错误"（语法错误 E9、未定义名/重复参数等 F7/F82/F63），
# 不拦风格类问题（行宽、未使用 import、命名等）。原因：存量代码风格问题很多，
# 一上来全开会让 verify.sh 长红、失去意义。先确保"会崩的错误"为零，
# 待存量整改后再逐步打开更多规则（建议顺序：F401 未用导入 → E → I 导入排序）。

line-length = 120
extend-exclude = ["lib", "build", "dist", ".venv", "venv"]

[lint]
# E9  = 语法/缩进等致命错误
# F63 = 无效比较 / assert 元组恒真等
# F7  = 语句位置错误（break/return 在函数外等）
# F82 = 使用了未定义的名字
select = ["E9", "F63", "F7", "F82"]
